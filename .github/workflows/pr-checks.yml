name: PR Checks

on:
  pull_request:
    branches: [ main, develop ]

jobs:
  # This workflow triggers the individual workflows via workflow_call
  # The actual checks are performed by ci.yml which runs on pull_request events
  all-checks-passed:
    name: PR Checks Summary
    runs-on: ubuntu-latest
    steps:
      - name: All checks pass
        run: |
          echo "This job runs after all other workflows complete."
          echo "Individual workflows (backend-tests, backend-lint, etc.) run separately."
          echo "PR will be blocked if any workflow fails."

