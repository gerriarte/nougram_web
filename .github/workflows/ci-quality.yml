name: Calidad del Código (CI)

# ¿Cuándo se activa?
on:
  push:
    branches: [ "develop", "main" ]
  pull_request:
    branches: [ "develop", "main" ]

jobs:
  build-and-test:
    name: Compilar y Verificar
    runs-on: ubuntu-latest

    steps:
    - name: 1. Descargar código
      uses: actions/checkout@v3

    - name: 2. Configurar Node.js (v18)
      uses: actions/setup-node@v3
      with:
        node-version: 18
        cache: 'npm'

    - name: 3. Instalar dependencias limpias
      # 'npm ci' es más estricto y rápido que 'npm install' para servidores
      run: npm ci

    - name: 4. Intentar construir (Build)
      # --if-present evita errores si aún no configuras el script de build
      run: npm run build --if-present
      
    - name: 5. Correr Tests (Opcional por ahora)
      run: npm test --if-present