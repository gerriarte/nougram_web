name: CI

# Main CI workflow documentation
# Individual workflows (backend-tests, backend-lint, etc.) run independently
# based on their own triggers (push, pull_request events)
# This file serves as documentation and can be used for manual triggers

on:
  workflow_dispatch:
    description: 'Manually trigger all CI checks'

jobs:
  # Note: Individual workflows run independently
  # They don't need to be called from here as they have their own on: triggers
  documentation:
    runs-on: ubuntu-latest
    steps:
      - name: CI Documentation
        run: |
          echo "Individual workflows run independently based on their triggers:"
          echo "- backend-tests.yml runs on push/PR to backend/**"
          echo "- backend-lint.yml runs on push/PR to backend/**"
          echo "- backend-docker.yml runs on push/PR to backend/**"
          echo "- frontend-lint.yml runs on push/PR to frontend/**"
          echo "- frontend-build.yml runs on push/PR to frontend/**"
          echo "- frontend-tests.yml runs on push/PR to frontend/**"
          echo ""
          echo "All workflows run automatically on push and pull_request events."
