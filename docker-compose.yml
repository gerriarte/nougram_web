version: '3.8'

# Docker Compose estándar para desarrollo
# Usa este archivo como configuración principal
# Puerto: 5435 (para evitar conflictos con instalaciones locales de PostgreSQL)

services:
  postgres:
    image: postgres:15-alpine
    container_name: nougram-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: nougram_db
    ports:
      - "5435:5432"  # Puerto externo 5435 -> interno 5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
