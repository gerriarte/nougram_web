# Override para HTTPS con Let's Encrypt
# Uso: docker compose -f docker-compose.prod.yml -f docker-compose.prod.ssl.yml up -d
# Requisito: Ejecutar scripts/setup-letsencrypt.sh antes (genera certs en ./certbot/)

version: '3.8'

services:
  nginx:
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx-ssl.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/live/${SSL_DOMAIN:-localhost}:/etc/nginx/ssl:ro
    environment:
      - SSL_DOMAIN=${SSL_DOMAIN:-localhost}
